services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: passvault
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/passvault
      JWT_SECRET: your_jwt_secret_here
      ENCRYPTION_KEY: your_encryption_key_here
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node src/models/migrate.js && node src/app.js"

volumes:
  pgdata: